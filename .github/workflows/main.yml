name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  buildWindows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.6

      - name: Install Haxelib
        run: |
          haxelib setup C:/haxelib
          haxelib install hxcpp > /dev/null --quiet
          .\setup\windows.bat
        shell: cmd

      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION

      - name: Compile
        run: haxelib run lime build windows
        shell: cmd

      - name: Publish Artifact
        uses: actions/upload-artifact@v4.3.6
        with:
          name: TwistEngine_${{github.run_id}}_Windows
          path: export/dev/windows/bin

      - name: Zip Release Build
        if: github.event_name == 'release'
        run: Compress-Archive -Path export/dev/windows/bin/* -DestinationPath TwistEngine-Windows.zip
        shell: pwsh

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: TwistEngine-Windows.zip
